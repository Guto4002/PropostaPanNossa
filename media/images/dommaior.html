<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dom Maior — Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0e0e0e;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .browser{width:100%;max-width:860px;border-radius:12px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08)}
    .bar{background:#1a1a1a;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.06)}
    .dots{display:flex;gap:6px}
    .dot{width:12px;height:12px;border-radius:50%}
    .dot-r{background:#ff5f57}
    .dot-y{background:#febc2e}
    .dot-g{background:#28c840}
    .url-bar{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:6px 12px;display:flex;align-items:center;gap:8px}
    .lock{width:12px;height:12px;opacity:0.4}
    .url-text{font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:0.03em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .actions{display:flex;gap:8px}
    .action-btn{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;cursor:pointer;border:none;transition:all 0.2s}
    .btn-primary{background:#ec7a37;color:#0e0e0e}
    .btn-primary:hover{background:#ffb949}
    .preview-img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;object-position:top}
    .footer{background:#141414;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.06)}
    .footer-tag{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:0.1em;text-transform:uppercase}
    .footer-brand{font-size:12px;color:#ec7a37;font-weight:500}
  </style>
</head>
